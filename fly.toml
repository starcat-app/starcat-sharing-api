# fly.toml app configuration file generated for starcat-sharing-api on 2026-06-08T01:05:38+08:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#
# 与 starcat-trending-api / starcat-weekly-api 保持一致的 Fly.io 部署配置
# (端口、env、health check 等参照其他两个项目对齐)

app = 'starcat-sharing-api'
primary_region = 'nrt'

[build]

[env]
  GOGC = '100'
  GOMAXPROCS = '1'
  PORT = '5001'

[processes]
  app = './server'

[[mounts]]
  source = 'starcat_sharing_data'
  destination = '/data'

[http_service]
  internal_port = 5001
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 25
    soft_limit = 20

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/healthz'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
